<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Quick Edit Workflow — Side Panel</title>
<link rel="stylesheet" href="../../design-system/styles/primitives.css">
<link rel="stylesheet" href="../../design-system/styles/dark.css">
<link rel="stylesheet" href="../../design-system/styles/aliases.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body, 'DM Sans', Inter, ui-sans-serif, system-ui, sans-serif); background: var(--color-bg-page); overflow: hidden; height: 100vh; }
.tab-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: space-between;
  height: 44px; padding: 0 20px;
  background: var(--color-sidebar-bg); border-bottom: 1px solid var(--color-border-default);
}
.tab-bar-left {
  display: flex; align-items: center; gap: 8px;
}
.tab-bar-left .title {
  font-size: var(--font-size-sm, 13px); font-weight: 600; color: var(--color-text-header);
}
.tab-bar-left .subtitle {
  font-size: 11px; color: var(--color-text-disabled); font-weight: 400;
}
.tab-bar-right {
  display: flex; align-items: center; gap: 4px;
}
.nav-tab {
  font-size: var(--font-size-caption, 12px); font-weight: 500; padding: 6px 12px;
  border-radius: var(--radius-md, 6px); border: 1px solid transparent;
  color: var(--color-text-caption); background: transparent;
  cursor: pointer; transition: all var(--duration-normal, .15s);
}
.nav-tab:hover { color: var(--color-text-body); }
.nav-tab.active {
  background: var(--color-sidebar-selected-bg); border-color: var(--color-brand-primary-dim); color: var(--color-brand-primary);
}
.iframe-container {
  position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
}
.iframe-container iframe {
  width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0;
}
</style>
</head>
<body>
<div class="tab-bar">
  <div class="tab-bar-left">
    <span class="title">Quick Edit Workflow</span>
    <span class="subtitle">#298804</span>
  </div>
  <div class="tab-bar-right">
    <button class="nav-tab active" data-tab="cxp" onclick="switchTab('cxp')">Side Panel (CXP)</button>
    <button class="nav-tab" data-tab="market" onclick="switchTab('market')">Side Panel (Market)</button>
  </div>
</div>
<div class="iframe-container">
  <iframe id="frame-cxp" src="cxp.html"></iframe>
  <iframe id="frame-market" src="market.html" style="display:none;"></iframe>
</div>
<script>
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  document.getElementById('frame-cxp').style.display = tab === 'cxp' ? '' : 'none';
  document.getElementById('frame-market').style.display = tab === 'market' ? '' : 'none';
}
</script>
</body>
</html>
